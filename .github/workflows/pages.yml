name: Deploy to GitHub Pages

on:
  push:
    branches: [ pre ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          cat .public-env > .env
          echo "EXPO_PUBLIC_BUILD_TIME=$(date +%s)" >> .env

      - name: Build pre release
        run: npx expo export
        env:
          EXPO_PUBLIC_BASE_URL: /echo/pre
          EXPO_PUBLIC_DESKTOP: "true"

      - name: Prepare output directory
        run: |
          mkdir -p deploy/pre
          mv dist/* deploy/pre/
          git checkout origin/main
          pnpm install --frozen-lockfile
          npx expo export
          mv dist/* deploy/
        env:
          EXPO_PUBLIC_BASE_URL: /echo
          EXPO_PUBLIC_DESKTOP: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
